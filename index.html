<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>APTV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: #111;
            color: #fff;
            min-height: 100vh;
        }
        .tip-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            z-index: 9999;
            pointer-events: none;
        }
        .modal-box {
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10000;
            pointer-events: auto;
        }
        .text-item {
            margin: 14px 0;
            font-size: 17px;
            line-height: 1.6;
        }
        .warn-red {
            color: #ff3333;
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0 40px;
        }
        .check-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 18px;
            margin-bottom: 30px;
        }
        #agreeCheck {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }
        .enter-btn {
            width: 200px;
            height: 55px;
            border: none;
            border-radius: 4px;
            font-size: 17px;
            cursor: pointer;
            background: #28a745;
            color: white;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .enter-btn:active {
            background: #218838;
        }
        .alert-text {
            color: #ff5555;
            margin-top: 15px;
            font-size: 16px;
            display: none;
        }
        .video-page {
            display: none;
            padding: 25px 12px;
            max-width: 900px;
            margin: 0 auto;
        }
        .video-card {
            margin-bottom: 35px;
        }
        video {
            width: 100%;
            background: #000;
            border: 2px solid #333;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="tip-modal" id="tipModal">
        <div class="modal-box">
            <div class="text-item">
                里面可能会出现突脸、噪音等<br>There may be jump scares, loud noises, etc.
            </div>
            <div class="text-item">
                若有任何不适或心理问题，网站不负责<br>The website is not responsible for any discomfort or psychological problems.
            </div>
            <div class="warn-red">
                请慎重考虑<br>Please think carefully
            </div>
            <div class="check-wrap">
                <input type="checkbox" id="agreeCheck">
                <label for="agreeCheck">我已阅读以上提醒</label>
            </div>
            <button class="enter-btn" id="enterBtn">进入</button>
            <div class="alert-text" id="alertTip">请阅读并点击旁边的方框</div>
        </div>
    </div>

    <!-- 全部删掉上方的APTV(xxx)标题，只剩播放器 -->
    <div class="video-page" id="videoContainer">
        <div class="video-card">
            <video src="./APTV(快跑).mp4" controls></video>
        </div>
        <div class="video-card">
            <video src="./APTV(甜蜜之家).mp4" controls></video>
        </div>
        <div class="video-card">
            <video src="./APTV(伪神翁).mp4" controls></video>
        </div>
        <div class="video-card">
            <video src="./APTV (巧手厨房).mp4" controls></video>
        </div>
    </div>

    <script>
        const tipModal = document.getElementById('tipModal');
        const videoPage = document.getElementById('videoContainer');
        const agreeCheck = document.getElementById('agreeCheck');
        const enterBtn = document.getElementById('enterBtn');
        const alertTip = document.getElementById('alertTip');

        enterBtn.addEventListener('click', () => {
            if (!agreeCheck.checked) {
                alertTip.style.display = 'block';
            } else {
                tipModal.style.display = 'none';
                videoPage.style.display = 'block';
                alertTip.style.display = 'none';
            }
        })
        agreeCheck.addEventListener('change', () => {
            if(agreeCheck.checked) alertTip.style.display = 'none';
        })
    </script>
</body>
</html>
